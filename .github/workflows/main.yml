name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout game code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone Love-Android build tools
        run: git clone --recurse-submodules https://github.com/love2d/love-android.git build-tools

      - name: Copy game.love to assets
        run: |
          mkdir -p build-tools/app/src/main/assets
          cp BombAll.love build-tools/app/src/main/assets/game.love

      - name: Build APK
        working-directory: build-tools
        run: chmod +x gradlew && ./gradlew assembleNormal

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BombAll-APK
          path: build-tools/app/build/outputs/apk/normal/debug/*.apk
