name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Love-Android
        uses: phithis/love-android-action@v1.4.1
        with:
          game_path: BombAll.love
          bundle_id: com.klifanik.bomball
          game_name: "Bomb All"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BombAll-APK
          path: "**/*.apk"
